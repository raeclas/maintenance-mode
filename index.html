<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Maintenance Mode</title>
<link rel="stylesheet" href="./style.css">
</head>
<body>
<main>
  <div id="resbar" class="game hidden">
    <span class="res">bots <b id="resBots">—</b></span>
    <span class="res copper"><b id="copperEl">0</b>c</span>
  </div>

  <nav id="tabs" class="game hidden">
    <button data-tab="battleSec" class="active">Boss</button>
    <button data-tab="botSec">Training</button>
    <button data-tab="farmSec">Grind</button>
    <button data-tab="gearSec">Player</button>
  </nav>

  <section id="battleSec" class="tabpane">
    <div class="bossPanel">
      <div id="bossName"></div>
      <div id="bossTitle"></div>
      <div id="record"></div>
    </div>

    <canvas id="battle"></canvas>

    <div class="controls">
      <button id="pullBtn">Attempt</button>
      <span id="depth">—</span>
      <span id="cooldown"></span>
    </div>
    <div id="projection"></div>

    <div id="monument" style="display:none">W1 — Broken · Vess, Warden of the First Door</div>

    <div id="dialogue"></div>
  </section>

  <section id="botSec" class="game hidden tabpane" style="display:none">
    <h2>Training — the bot farm</h2>
    <div class="rig">
      <button id="buyCap"></button>
      <button id="buyCreate"></button>
      <button id="buyPower"></button>
      <button id="buySpeed"></button>
    </div>
    <div class="rigline" id="rigLine"></div>
    <div class="barTrack popTrack"><div class="barFill" id="popFill"></div></div>
    <div class="bar" id="barAtk">
      <div class="barHead">
        <span class="trackName">Train ATK</span>
        <span class="assign" data-track="atk">
          <button data-d="-10">−10</button><button data-d="-1">−1</button>
          <input type="number" id="allocAtk" min="0" step="1">
          <button data-d="1">+1</button><button data-d="10">+10</button>
          <button data-p="25">25%</button><button data-p="50">50%</button><button data-p="max">max</button><button data-p="0">0</button>
        </span>
        <span id="barAtkInfo"></span>
      </div>
      <div class="barTrack"><div class="barFill" id="barAtkFill"></div></div>
    </div>
    <div class="bar" id="barSpeed">
      <div class="barHead">
        <span class="trackName">Train SPEED</span>
        <span class="assign" data-track="spd">
          <button data-d="-10">−10</button><button data-d="-1">−1</button>
          <input type="number" id="allocSpd" min="0" step="1">
          <button data-d="1">+1</button><button data-d="10">+10</button>
          <button data-p="25">25%</button><button data-p="50">50%</button><button data-p="max">max</button><button data-p="0">0</button>
        </span>
        <span id="barSpeedInfo"></span>
      </div>
      <div class="barTrack"><div class="barFill" id="barSpeedFill"></div></div>
    </div>
  </section>

  <section id="farmSec" class="game hidden tabpane" style="display:none">
    <h2>Grind</h2>
    <div class="bar">
      <div class="barHead">
        <span class="trackName">Bot squad</span>
        <span class="assign" data-track="farm">
          <button data-d="-10">−10</button><button data-d="-1">−1</button>
          <input type="number" id="allocFarm" min="0" step="1">
          <button data-d="1">+1</button><button data-d="10">+10</button>
          <button data-p="25">25%</button><button data-p="50">50%</button><button data-p="max">max</button><button data-p="0">0</button>
        </span>
        <select id="botZone"></select>
        <span id="botFarmInfo"></span>
      </div>
    </div>
    <div id="zones"></div>
  </section>

  <section id="gearSec" class="game hidden tabpane" style="display:none">
    <h2>Player</h2>
    <div id="playerStats">DPS <b id="dpsEl">—</b> · ATK <span id="atkEl">—</span> · <span id="hpsEl">—</span> hits/s</div>
    <div id="titles" style="display:none"></div>
    <h3>Gear <span id="stacksHud"></span></h3>
    <label class="autoSalv"><input type="checkbox" id="safeguard"> safeguard (3× cost, no drop on fail — works up to +15 only)</label>
    <div id="slots"></div>
    <div id="stashHead">
      <button id="stashToggle"></button>
      <button id="salvageAll">salvage all unlocked</button>
      <label class="autoSalv"><input type="checkbox" id="autoSalvage"> auto-salvage non-upgrades</label>
    </div>
    <div id="stashList" style="display:none"></div>
  </section>

  <div id="log"></div>

  <footer><button id="wipeBtn">wipe save (dev)</button></footer>
</main>
<script type="module" src="./main.js"></script>
</body>
</html>
