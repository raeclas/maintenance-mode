<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Maintenance Mode</title>
<link rel="stylesheet" href="./style.css">
</head>
<body>
<main>
  <header>
    <h1>Maintenance Mode</h1>
    <div class="serverline">SERVER STATUS: ONLINE · PLAYERS: <span id="playerCount">1</span> · LAST PATCH: 2,190 days ago</div>
  </header>

  <div id="statsbar" class="game hidden">
    DPS <b id="dpsEl">—</b> · ATK <span id="atkEl">—</span> · <span id="hpsEl">—</span> hits/s · <span class="copper"><span id="copperEl">0</span>c</span>
  </div>

  <div class="bossPanel">
    <div id="bossName"></div>
    <div id="bossTitle"></div>
    <div id="record"></div>
  </div>

  <canvas id="battle"></canvas>

  <div class="controls">
    <button id="pullBtn">Attempt</button>
    <span id="depth">—</span>
    <span id="cooldown"></span>
  </div>
  <div id="projection"></div>

  <div id="monument" style="display:none">W1 — Broken · Vess, Warden of the First Door</div>
  <div id="titles" style="display:none"></div>

  <div id="dialogue"></div>

  <section id="botSec" class="game hidden">
    <h2>Bot Farm</h2>
    <div class="rig">
      <button id="buyCap"></button>
      <button id="buyCreate"></button>
      <button id="buyPower"></button>
      <button id="buySpeed"></button>
    </div>
    <div class="rigline" id="rigLine"></div>
    <div class="barTrack popTrack"><div class="barFill" id="popFill"></div></div>
    <div class="bar" id="barAtk">
      <div class="barHead">
        <span class="trackName">Train ATK</span>
        <span class="assign"><input type="number" id="allocAtk" min="0" step="1"> bots</span>
        <span id="barAtkInfo"></span>
      </div>
      <div class="barTrack"><div class="barFill" id="barAtkFill"></div></div>
    </div>
    <div class="bar" id="barSpeed">
      <div class="barHead">
        <span class="trackName">Train SPEED</span>
        <span class="assign"><input type="number" id="allocSpd" min="0" step="1"> bots</span>
        <span id="barSpeedInfo"></span>
      </div>
      <div class="barTrack"><div class="barFill" id="barSpeedFill"></div></div>
    </div>
    <div class="bar">
      <div class="barHead">
        <span class="trackName">Farm</span>
        <span class="assign"><input type="number" id="allocFarm" min="0" step="1"> bots</span>
        <select id="botZone"></select>
        <span id="botFarmInfo"></span>
      </div>
    </div>
  </section>

  <section id="farmSec" class="game hidden">
    <h2>Farming</h2>
    <div id="zones"></div>
  </section>

  <section id="gearSec" class="game hidden">
    <h2>Gear <span id="stacksHud"></span></h2>
    <label class="autoSalv"><input type="checkbox" id="safeguard"> safeguard (3× cost, no drop on fail — works up to +15 only)</label>
    <div id="slots"></div>
    <div id="stashHead">
      <button id="stashToggle"></button>
      <button id="salvageAll">salvage all unlocked</button>
      <label class="autoSalv"><input type="checkbox" id="autoSalvage"> auto-salvage non-upgrades</label>
    </div>
    <div id="stashList" style="display:none"></div>
  </section>

  <div id="log"></div>

  <footer><button id="wipeBtn">wipe save (dev)</button></footer>
</main>
<script type="module" src="./main.js"></script>
</body>
</html>
