<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Maintenance Mode</title>
<link rel="stylesheet" href="./style.css">
</head>
<body>
<main>
  <header>
    <h1>Maintenance Mode</h1>
    <div class="serverline">SERVER STATUS: ONLINE · PLAYERS: 1 · LAST PATCH: 2,190 days ago</div>
  </header>

  <div class="bossPanel">
    <div id="bossName"></div>
    <div id="bossTitle"></div>
    <div id="record"></div>
  </div>

  <canvas id="battle"></canvas>

  <div class="controls">
    <button id="pullBtn">Pull</button>
    <span id="depth">—</span>
    <span id="cooldown"></span>
  </div>
  <div id="projection"></div>

  <div id="monument" style="display:none">W1 — Broken · Vess, Warden of the First Door</div>

  <div id="dialogue"></div>

  <div id="log"></div>

  <footer><button id="wipeBtn">wipe save (dev)</button></footer>
</main>
<script type="module" src="./main.js"></script>
</body>
</html>
